service_id: svc-26
service_name: appraisal-report-service
domain: Appraisal
subdomain: Appraisal Reporting
owner_team: team-appraisal
tech_stack: Kotlin / Spring Boot
summary: >
  Generates consolidated appraisal reports that combine valuation data from vehicle
  or property appraisals into a standardised document. Reports are stored in S3 and
  made available for download by backoffice, compliance, and external auditors.
business_objective: >
  Provide a single, auditable appraisal artefact for each loan proposal that satisfies
  regulatory record-keeping requirements and supports downstream contract generation
  and portfolio management.

responsibilities:
  - Consume vehicle_appraised and property_appraised events
  - Aggregate valuation data into a standardised report format
  - Generate PDF reports using a templating engine
  - Upload generated reports to S3 (appraisal_reports bucket)
  - Store report metadata in PostgreSQL for indexing and retrieval
  - Expose REST endpoints for report retrieval and download
  - Publish appraisal_completed events signalling the end of the appraisal workflow

entities:
  - name: AppraisalReport
    description: >
      Metadata record for a generated appraisal report: proposal_id, report type
      (vehicle/property), generation date, S3 object key, and status.
  - name: ValuationSummary
    description: >
      A condensed summary of the valuation embedded in the report, including
      appraised value, methodology, key assumptions, and confidence level.

apis:
  - method: GET
    path: /api/v1/appraisal-reports/{id}
    description: >
      Returns the appraisal report metadata, including status and valuation summary.
  - method: GET
    path: /api/v1/appraisal-reports/{id}/download
    description: >
      Returns a pre-signed S3 URL for downloading the PDF appraisal report.

events:
  publishes:
    - name: appraisal_completed
      description: >
        Emitted when the appraisal report has been generated and stored. Signals
        the end of the appraisal workflow. Payload includes proposal_id, report_id,
        appraised_value, and collateral_type.
  consumes:
    - name: vehicle_appraised
      description: Triggers report generation for vehicle appraisals.
    - name: property_appraised
      description: Triggers report generation for property appraisals.

databases:
  - name: appraisal_report_db
    type: PostgreSQL
    purpose: >
      Stores AppraisalReport metadata and ValuationSummaries. Provides indexed
      queries by proposal_id, date range, and report status.
  - name: appraisal_reports
    type: S3
    purpose: >
      Object storage for generated PDF appraisal reports. Lifecycle policy
      retains reports for 10 years per regulatory requirements.

dependencies:
  - service_name: vehicle-appraisal-service
    type: internal (event)
    purpose: Source of vehicle valuation data via vehicle_appraised events.
  - service_name: property-appraisal-service
    type: internal (event)
    purpose: Source of property valuation data via property_appraised events.

flows:
  - name: Report Generation
    description: Generates and stores an appraisal report from valuation data.
    steps:
      - Receive vehicle_appraised or property_appraised event
      - Extract valuation data and proposal metadata from event payload
      - Create ValuationSummary from the valuation data
      - Render PDF report using the appropriate template (vehicle or property)
      - Upload PDF to S3 appraisal_reports bucket
      - Create AppraisalReport metadata record in appraisal_report_db
      - Publish appraisal_completed event
  - name: Report Download
    description: Serves report downloads via pre-signed URLs.
    steps:
      - Receive GET /api/v1/appraisal-reports/{id}/download
      - Look up AppraisalReport metadata to get S3 object key
      - Generate pre-signed S3 URL with 15-minute expiry
      - Return URL to caller

observability:
  metrics:
    - report_generation_total (counter) — reports generated by collateral_type
    - report_generation_duration_seconds (histogram) — PDF generation and upload time
    - report_download_total (counter) — report downloads
    - s3_upload_errors_total (counter) — S3 upload failures
    - report_size_bytes (histogram) — generated PDF sizes
  alerts:
    - report_generation_failure — fires when generation errors exceed 2 % over 10 min
    - s3_upload_failure — fires on any S3 upload error (critical path)
    - report_generation_latency_high — fires when p95 exceeds 30 s
  dashboards:
    - Appraisal Reports Overview — generation volume, download rate, latency
    - Storage Analytics — S3 bucket size growth, report size distribution

risks_and_limitations:
  - PDF generation is CPU-intensive; spikes in appraisal volume can cause latency
  - S3 availability is critical; upload failures block the appraisal workflow completion
  - Reports contain financial data; S3 bucket must have encryption enabled and restricted access
  - 10-year retention policy generates significant storage costs over time
  - Template changes require service redeployment

related_documents:
  - docs/adr/adr-026-appraisal-report-storage.md
  - docs/runbooks/appraisal-report-runbook.md
  - docs/api-contracts/appraisal-report-openapi.yaml
